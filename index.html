<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="favicon.png">
<link rel='manifest' href='manifest.json'>  
<title>Redify</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>Redify</div>
    <div class="search-wrap">
      <i class="ti ti-search" style="font-size:15px;color:var(--t3)"></i>
      <input type="text" placeholder="Search songs, artists, genres..." id="searchInput" />
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="nav-item active" id="nav-discover" onclick="navTo('discover',this)"><i class="ti ti-home"></i> Discover</div>
      <div class="nav-item" id="nav-trending" onclick="navTo('trending',this)"><i class="ti ti-trending-up"></i> Trending</div>
      <div class="nav-item" id="nav-genres" onclick="navTo('genres',this)"><i class="ti ti-category"></i> Genres</div>
      <div class="nav-item" id="nav-favorites" onclick="navTo('favorites',this)">
        <i class="ti ti-heart"></i> Favorites
        <span id="favCount" style="margin-left:auto;font-size:10px;background:var(--accent-l);color:var(--accent-d);padding:1px 7px;border-radius:999px;display:none">0</span>
      </div>
      <div class="sidebar-label">My Playlists</div>
      <div id="playlistNav"></div>
      <div class="playlist-item" style="color:var(--t3);font-size:15px;padding:8px 10px;cursor:pointer" onclick="createPlaylistPrompt()">
        <i class="ti ti-plus" style="font-size:15px;vertical-align:-1px"></i> New playlist
      </div>
    </div>
    <div class="content" id="songContent">
      <div>
        <div class="section-header"><div class="section-title">🔥 Trending Now</div></div>
        <div class="song-list" id="songList"></div>
      </div>
    </div>
  </div>
<div class="player">
  <div class="player-info">
    <div class="player-art" id="playerArt">🎵</div>
    <div style="display:flex;gap:6px;margin-left:10px">
      <button class="icon-btn" onclick="addCurrentToPlaylist()" title="Add to playlist"><i class="ti ti-playlist-add"></i></button>
    </div>
    <div class="player-meta">
      <div class="player-title" id="playerTitle"></div>   
      <div class="player-artist" id="playerArtist">—</div>
    </div>
  </div>
    <div class="controls">
      <div class="ctrl-btns"> 
        <div class="visualizer" id="visualizer"></div>
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle"><i class="ti ti-arrows-shuffle"></i></button>
        <button class="ctrl-btn" onclick="prevSong()" title="Previous"><i class="ti ti-player-skip-back"></i></button>
        <button class="play-btn" onclick="togglePlay()"><i class="ti ti-player-play" id="playIcon"></i></button>
        <button class="ctrl-btn" onclick="nextSong()" title="Next"><i class="ti ti-player-skip-forward"></i></button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat"><i class="ti ti-repeat"></i></button>
      </div>
      <div class="progress-bar">
        <span class="prog-time" id="progCur">0:00</span>
        <div class="prog-track" onclick="seekSong(event)"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        <span class="prog-time" id="progEnd">—</span>
      </div>
    </div>
    <div class="player-right">
    </div>
</div>
<div class="mobile-bottomnav">
    <div class="mob-nav-item active" id="mnav-discover" onclick="navTo('discover',document.getElementById('nav-discover'));setMobNav(this)">
      <i class="ti ti-home"></i><span>Home</span>
    </div>
    <div class="mob-nav-item" id="mnav-trending" onclick="navTo('trending',document.getElementById('nav-trending'));setMobNav(this)">
      <i class="ti ti-trending-up"></i><span>Trending</span>
    </div>
    <div class="mob-nav-item" id="mnav-genres" onclick="navTo('genres',document.getElementById('nav-genres'));setMobNav(this)">
      <i class="ti ti-category"></i><span>Genres</span>
    </div>
    <div class="mob-nav-item" id="mnav-favorites" onclick="navTo('favorites',document.getElementById('nav-favorites'));setMobNav(this)">
      <i class="ti ti-heart"></i><span>Favorites</span>
    </div>
    <div class="mob-nav-item" id="mnav-playlists" onclick="showMobilePlaylists();setMobNav(this)">
      <i class="ti ti-playlist"></i><span>Lists</span>
    </div>
  </div>
<div class="toast" id="toast"></div>
<!-- Playlist Modal -->
<div id="plModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--bg1);border-radius:14px;padding:24px;min-width:280px;max-width:340px;width:90%">
    <div id="plModalContent"></div>
  </div>
</div>
<script src="storage.js"></script>
<script src="script.js"></script>
</body>
</html>
